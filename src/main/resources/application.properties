spring.application.name=telegramBot
# Supports both BOT_TOKEN (recommended) and legacy botToken env/property names.
bot.token=${BOT_TOKEN:${botToken:}}
# Telegram username from BotFather, e.g. my_assistant_bot.
bot.username=${BOT_USERNAME:${botUsername:}}
spring.datasource.url=jdbc:h2:mem:testdb
spring.h2.console.enabled=true

logging.level.by.demo=DEBUG
